<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Text Effect Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Arial Black', sans-serif;
        }

        .glitch-container {
            text-align: center;
        }

        .glitch {
            position: relative;
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #fff;
            text-transform: uppercase;
        }

        /* Main text */
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Cyan glitch layer */
        .glitch::before {
            animation: glitch-1 2.5s infinite;
            color: #00fff9;
            z-index: -1;
        }

        /* Red/Magenta glitch layer */
        .glitch::after {
            animation: glitch-2 2.5s infinite;
            color: #ff00c1;
            z-index: -2;
        }

        /* Cyan glitch animation */
        @keyframes glitch-1 {
            0%, 100% {
                transform: translate(0);
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }
            10% {
                transform: translate(-5px, -5px);
                clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            }
            20% {
                transform: translate(3px, 5px);
                clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
            }
            30% {
                transform: translate(-3px, 3px);
                clip-path: polygon(0 10%, 100% 10%, 100% 40%, 0 40%);
            }
            40% {
                transform: translate(2px, -2px);
                clip-path: polygon(0 50%, 100% 50%, 100% 80%, 0 80%);
            }
            50% {
                transform: translate(-5px, 5px);
                clip-path: polygon(0 70%, 100% 70%, 100% 95%, 0 95%);
            }
        }

        /* Red/Magenta glitch animation */
        @keyframes glitch-2 {
            0%, 100% {
                transform: translate(0);
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }
            15% {
                transform: translate(5px, 5px);
                clip-path: polygon(0 30%, 100% 30%, 100% 70%, 0 70%);
            }
            25% {
                transform: translate(-3px, -3px);
                clip-path: polygon(0 0, 100% 0, 100% 25%, 0 25%);
            }
            35% {
                transform: translate(4px, -4px);
                clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%);
            }
            45% {
                transform: translate(-2px, 2px);
                clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%);
            }
            55% {
                transform: translate(5px, -5px);
                clip-path: polygon(0 5%, 100% 5%, 100% 35%, 0 35%);
            }
        }

        /* Digital corruption blocks - the "choppy" artifacts */
        .glitch::after {
            animation: glitch-2 2.5s infinite, blocks 2s infinite;
            background: 
                linear-gradient(90deg, transparent 0%, transparent 48%, #ff00c1 48%, #ff00c1 52%, transparent 52%),
                linear-gradient(90deg, transparent 0%, transparent 73%, #ff00c1 73%, #ff00c1 78%, transparent 78%);
            background-size: 100% 2px, 100% 3px;
            background-position: 0 20%, 0 80%;
            background-repeat: no-repeat;
        }

        .glitch::before {
            background: 
                linear-gradient(90deg, transparent 0%, transparent 25%, #00fff9 25%, #00fff9 30%, transparent 30%),
                linear-gradient(90deg, transparent 0%, transparent 60%, #00fff9 60%, #00fff9 65%, transparent 65%);
            background-size: 100% 2px, 100% 3px;
            background-position: 0 40%, 0 70%;
            background-repeat: no-repeat;
            animation: glitch-1 2.5s infinite, blocks 2s infinite reverse;
        }

        /* Rectangular block artifacts */
        @keyframes blocks {
            0%, 100% {
                box-shadow: 
                    20px 10px 0 2px rgba(0, 255, 249, 0.3),
                    -15px -8px 0 3px rgba(255, 0, 193, 0.3);
            }
            25% {
                box-shadow: 
                    -10px 20px 0 2px rgba(0, 255, 249, 0.4),
                    25px -15px 0 2px rgba(255, 0, 193, 0.4);
            }
            50% {
                box-shadow: 
                    15px -10px 0 3px rgba(0, 255, 249, 0.3),
                    -20px 12px 0 2px rgba(255, 0, 193, 0.3);
            }
            75% {
                box-shadow: 
                    -18px -15px 0 2px rgba(0, 255, 249, 0.4),
                    18px 18px 0 3px rgba(255, 0, 193, 0.3);
            }
        }

        /* Additional sample text */
        .sample {
            margin-top: 3rem;
        }

        .sample .glitch {
            font-size: 4rem;
        }
    </style>
</head>
<body>
    <div class="glitch-container">
        <h1 class="glitch" data-text="CONSTANT LABS">CONSTANT LABS</h1>
        
        <div class="sample">
            <h2 class="glitch" data-text="GLITCH">GLITCH</h2>
        </div>
    </div>
</body>
</html>
